name: CI
on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build Linux Command
        run: |
          npm run build
          cp CONTRIBUTORS.svg .deploy 2>/dev/null || true

      - name: Update Dash Feed
        run: |
          version=$(cat package.json | grep '"version"' | head -1 | awk -F'"' '{print $4}')
          echo "<entry><version>${version}</version><url>https://benben17.github.io/linux-command/linux-command.docset.tgz</url></entry>" > .deploy/linux-command-docset.xml

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.deploy
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      - name: 📦 Publish to NPM
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Get Package Version
        id: package
        run: |
          VERSION=$(cat package.json | grep '"version"' | head -1 | awk -F'"' '{print $4}')
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v${{ env.PACKAGE_VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/linux-command:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/linux-command:v${{ env.PACKAGE_VERSION }}
